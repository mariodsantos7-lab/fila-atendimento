version: "3.8"

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: filadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data  # persiste dados entre restarts
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      DB_HOST: db
      POSTGRES_DB: filadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      DB_HOST: db
      POSTGRES_DB: filadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "8080:3000"
    environment:
      REDIS_HOST: redis
      DB_HOST: db
      POSTGRES_DB: filadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      - db
      - redis

volumes:
  db_data: