name: 'DevOps CI Pipeline'

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  terraform-k8s-validation:
    name: 'Validate IaC and K8s Manifests'
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do repositório
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Instala e configura o Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.8.5

    # 3. Valida a sintaxe do Terraform
    - name: Terraform Init & Validate
      run: |
        cd terraform
        terraform init -backend=false
        terraform validate

    # 4. Instala o Kubectl usando a Action Oficial
    - name: Setup Kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.27.4'

    # 5. Validação de Sintaxe Estrutural dos Manifestos
    - name: Validate Kubernetes Manifests
      run: |
        kubectl score version || true
        # Validação puramente estrutural ("Dry-Run" local)
        find k8s/ -name "*.yaml" -type f | while read -r file; do
          echo "Validando estruturalmente: $file"
          kubectl patch -f "$file" --local -p '{}'
        done