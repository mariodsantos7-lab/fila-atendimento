apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: fila-atendimento
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: fila-dashboard:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: db-secret
        env:
        - name: REDIS_HOST
          value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: fila-atendimento
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30001