apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: fila-atendimento
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.0.0
        ports:
        - containerPort: 3000
          name: grafana
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin" # Senha padrão para o seu laboratório
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: fila-atendimento
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30002 # Abrimos a porta 30002 para acessar o Grafana!